name: ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for keyless auth to GCP (Workload Identity Federation)

env:
  REGION: us-central1
  SERVICE: llm-inference
  AR_REPO: llm
  IMAGE_NAME: vllm-awq

jobs:
  # ---------------- runs on every PR and push ----------------
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app tools
      - run: pytest -q

  # ---------------- main only: build the image ----------------
  # The deploy stage stays dormant (and CI stays green) until the GCP_PROJECT_ID
  # repo variable is set. Once you've done the cloud setup, it activates itself.
  build:
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.GCP_PROJECT_ID != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe "$AR_REPO" --location="$REGION" \
            --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$AR_REPO" --repository-format=docker \
            --location="$REGION" --project="${{ vars.GCP_PROJECT_ID }}"
      - name: Build & push image (Cloud Build)
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/$AR_REPO/$IMAGE_NAME:${{ github.sha }}"
          gcloud builds submit --config deploy/cloudbuild.yaml \
            --substitutions=_IMAGE="$IMAGE" --region="$REGION" \
            --project="${{ vars.GCP_PROJECT_ID }}" .

  # ---------------- main only: deploy to Cloud Run ----------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy (replace service from cloudrun.yaml)
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/$AR_REPO/$IMAGE_NAME:${{ github.sha }}"
          sed "s|IMAGE_PLACEHOLDER|$IMAGE|" deploy/cloudrun.yaml | \
            gcloud run services replace - --region="$REGION" --project="${{ vars.GCP_PROJECT_ID }}"
      - name: Allow public access (gateway does its own API-key auth)
        run: |
          gcloud run services add-iam-policy-binding "$SERVICE" --region="$REGION" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --member=allUsers --role=roles/run.invoker
      - name: Capture service URL
        id: url
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region="$REGION" \
            --project="${{ vars.GCP_PROJECT_ID }}" --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

  # ---------------- main only: smoke test the live endpoint ----------------
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      URL: ${{ needs.deploy.outputs.url }}
      API_KEY: ${{ secrets.GATEWAY_API_KEY }}
    steps:
      - name: Wait for readiness and run a real completion
        run: |
          set -euo pipefail
          echo "Waiting for readiness (GPU cold start can take 30-90s)..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$URL/health/ready" || echo 000)
            echo "attempt $i: /health/ready -> $code"
            [ "$code" = "200" ] && break
            [ "$i" -eq 30 ] && { echo "service never became ready"; exit 1; }
            sleep 10
          done

          echo "Running a real completion..."
          resp=$(curl -s -w '\n%{http_code}' --max-time 120 \
            -H "Authorization: Bearer $API_KEY" -H "Content-Type: application/json" \
            -d '{"model":"Qwen2.5-7B-Instruct","messages":[{"role":"user","content":"Say OK"}],"max_tokens":8}' \
            "$URL/v1/chat/completions")
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP $code"; echo "$body"
          [ "$code" = "200" ] || { echo "completion failed"; exit 1; }
          echo "$body" | grep -q '"choices"' || { echo "malformed response"; exit 1; }
          echo "smoke test passed"

  # ---------------- main only: load-test gate (k6) ----------------
  loadtest:
    needs: [deploy, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Run k6 load test (fails on p95 / error-rate breach)
        uses: grafana/run-k6-action@v1
        with:
          path: benchmarks/loadtest.js
        env:
          URL: ${{ needs.deploy.outputs.url }}
          API_KEY: ${{ secrets.GATEWAY_API_KEY }}
